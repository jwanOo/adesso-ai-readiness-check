      html, body { margin: 0; padding: 0; min-height: 100%; background: #F7F9FC; font-family: 'Outfit', 'DM Sans', system-ui, -apple-system, sans-serif; }

        position: fixed; inset: 0; z-index: 999999;

      #gate.show { display: flex; }

      #gate .card {
        background: #fff;

      #gate .brand {
        display: inline-block;

      }
     gate h1 { margin: 16px 0 6px; font-size: 18px; color: #1B3A5; }
      #gate p.lead { color: #5D6D7E; font-size: 14px; margin: 00 20px; }
      #gate label { display: block; font-size: 14px; font-weight: 500; color:1B3A5C; margin-bottom: 6px; }
      #gate input {
        width: 100%; padding: 12 14px;
        border: 2px solid #E8EDF2; border-radius: 10px;
        font-size: 14; font-family: inherit; color: #1B3A5C;
        outline: none; margin-bottom: 14px; box-sizing border-box;
      }
      #gate input:focus { border-color: #2E86C1; box-shadow: 0 0  3px rgba(46,134,193,0.15); }
      #gate button {
        width: 100%; padding: px 18px; border: 0;
        background: linear-gradient(135deg, #1B3A5C, #2E861);
        color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700;
        cursor pointer; font-family: inherit;
      }
      #gate .err {
        margin-top: 12px; padding: 10px 12;
        background: #FDEDEC; border-left: 4px solid #E74C3C; color: #922B21;
 border-radius: 8px; font-size: 13px; display: none;
      }
      #gate .err.show { display: block; }
      #gate .note { margin-top: 18px; texttext-align: center; color: #7F8C8D; font-size: 12px; }
      #signout-fab {
        position: fixed; top: 12px; right: 12px; z-index: 9999;
        background: #fff; color: #1B3A5C; border: 2px solid #E8EDF2;

  <body class="gated">
    <div id="gate" class="show">
      <div class="card">
        <div style="text-align:center; margin-bottom:24px;">
          <div class="brand">Adesso AI Readiness Check</div>
        </div>
        <h1>Sign in</h1>
        <p class="lead">Authorized Adesso users only.</p>
        <form id="gate-form" autocomplete="on">
          <label for="ge">Email</label>
          <input id="ge" name="email" type="email" autocomplete="username" placeholder="firstname@adesso-group.com" required autofocus />
          <label for="gp">Password</label>
          <input id="gp" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          <button type="submit">Sign in</button>
          <div id="gate-err" class="err">Invalid email or password.</div>
          <div class="note">🔒 Internal tool · keep credentials confidential</div>
        </form>
      </div>
    </div>

    <button id="signout-fab" type="button" title="Sign out of the gate">⏏ Sign out</button>
    <div id="root"></div>

    <script>
      (function () {
        var AUTH_KEY = 'adesso_ai_readiness_gate';
        var USERS = [{ email: 'roman.borvitz@adesso-group.com', password: 'R0man@Adesso2026!' }];

        var gate = document.getElementById('gate');
        var form = document.getElementById('gate-form');
        var errBox = document.getElementById('gate-err');
        var signout = document.getElementById('signout-fab');

        function mountApp() {
          if (window.__adessoMounted) return;
          window.__adessoMounted = true;
          var appTag = document.createElement('script');
          appTag.type = 'module';
          appTag.crossOrigin = '';
          appTag.src = '/adesso-ai-readiness-check/assets/index-BhPe9XTt.js';
          document.body.appendChild(appTag);
        }

        function authed() {
          try {
            var raw = sessionStorage.getItem(AUTH_KEY);
            if (!raw) return false;
            var s = JSON.parse(raw);
            return !!USERS.find(function (u) { return u.email.toLowerCase() === (s.email || '').toLowerCase(); });
          } catch (_) { return false; }
        }

        function showApp() {
          gate.classList.remove('show');
          document.body.classList.remove('gated');
          signout.classList.add('show');
          mountApp();
        }

        if (authed()) {
          showApp();
        } else {
          form.addEventListener('submit', function (e) {
            e.preventDefault();
            var em = document.getElementById('ge').value.trim().toLowerCase();
            var pw = document.getElementById('gp').value;
            var m = USERS.find(function (u) { return u.email.toLowerCase() === em && u.password === pw; });
            if (m) {
              try { sessionStorage.setItem(AUTH_KEY, JSON.stringify({ email: m.email, ts: Date.now() })); } catch (_) {}
              errBox.classList.remove('show');
              showApp();
            } else {
              errBox.classList.add('show');
            }
          });
        }

        signout.addEventListener('click', function () {
          try { sessionStorage.removeItem(AUTH_KEY); } catch (_) {}
          window.location.reload();
        });
      })();
    </script>
  </body>
