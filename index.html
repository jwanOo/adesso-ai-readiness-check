<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adesso · AI Readiness Check</title>
  <meta name="description" content="Adesso AI Readiness Check — assess your organization's AI maturity." />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" />

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/react@18.3.1/umd/react.production.min.js';"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js';"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/@babel/standalone@7.25.6/babel.min.js';"></script>

  <style>
    /* ---- Design system mirroring jwanOo/ai-readiness-check ------------------- */
    * { box-sizing: border-box; font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body, #root { height: 100%; margin: 0; }
    body { background: #F5F7FA; color: #1B3A5C; line-height: 1.5; }

    .app { min-height: 100vh; background: linear-gradient(135deg, #F5F7FA 0%, #E8EDF2 100%); padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: 24px; box-shadow: 0 20px 60px rgba(27, 58, 92, 0.08); overflow: hidden; }

    .header { background: linear-gradient(135deg, #1B3A5C, #2E5C8A); color: white; padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 26px; color: #fff;
    }
    .header-title { font-size: 22px; font-weight: 700; margin: 0; }
    .header-sub { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .header .btn-ghost {
      background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25);
      padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .header .btn-ghost:hover { background: rgba(255,255,255,0.2); }

    .content { padding: 32px 40px; }

    .section-title { font-size: 20px; font-weight: 600; color: #1B3A5C; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #E8EDF2; display: flex; justify-content: space-between; align-items: center; }
    .section-badge { background: linear-gradient(135deg, #1B3A5C, #2E5C8A); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }

    .q-block { padding: 16px 0; border-bottom: 1px solid #F0F2F5; }
    .q-block:last-child { border-bottom: none; }
    .q-label { font-size: 15px; color: #1B3A5C; font-weight: 500; margin-bottom: 10px; }
    .q-help { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #E8EDF2; color: #5D6D7E; font-size: 11px; font-weight: 600; margin-left: 6px; cursor: help; vertical-align: middle; }
    .q-help:hover { background: #1B3A5C; color: white; }

    .input, .select, textarea { width: 100%; padding: 12px 14px; border: 2px solid #E8EDF2; border-radius: 10px; font-size: 14px; transition: all 0.2s; background: #fff; color: #1B3A5C; }
    .input:focus, .select:focus, textarea:focus { outline: none; border-color: #2E5C8A; box-shadow: 0 0 0 3px rgba(46, 92, 138, 0.1); }
    textarea { min-height: 80px; resize: vertical; }

    .button { background: linear-gradient(135deg, #1B3A5C, #2E5C8A); color: white; padding: 14px 28px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(27, 58, 92, 0.25); }
    .button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .button-secondary { background: #fff; color: #1B3A5C; border: 2px solid #E8EDF2; }
    .button-secondary:hover { background: #F7F9FC; border-color: #1B3A5C; transform: none; box-shadow: none; }
    .button-block { display: block; width: 100%; }

    .score-card { background: linear-gradient(135deg, #1B3A5C, #2E5C8A); color: white; padding: 32px; border-radius: 16px; text-align: center; margin-bottom: 24px; }
    .score-value { font-size: 64px; font-weight: 800; line-height: 1; margin: 12px 0; }
    .score-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
    .score-sub   { font-size: 14px; opacity: 0.85; margin-top: 8px; }

    .tabs { display: flex; gap: 4px; background: #F7F9FC; padding: 4px; border-radius: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { flex: 1; min-width: 110px; padding: 12px 16px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #5D6D7E; transition: all 0.2s; }
    .tab.active { background: white; color: #1B3A5C; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .tab.complete::after { content: ' ✓'; color: #27AE60; }

    .alert { padding: 16px 20px; border-radius: 10px; margin-bottom: 16px; display: flex; align-items: start; gap: 12px; font-size: 14px; line-height: 1.5; }
    .alert.warning { background: #FEF9E7; border-left: 4px solid #F39C12; color: #7D5A00; }
    .alert.danger  { background: #FDEDEC; border-left: 4px solid #E74C3C; color: #922B21; }
    .alert.success { background: #EAFAF1; border-left: 4px solid #27AE60; color: #1E8449; }
    .alert.info    { background: #EBF5FB; border-left: 4px solid #3498DB; color: #1F618D; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 720px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .header { padding: 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
      .content { padding: 24px; }
    }

    .info-card { background: #F7F9FC; padding: 16px; border-radius: 10px; }
    .info-card-label { font-size: 12px; color: #7F8C8D; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .info-card-value { font-size: 22px; font-weight: 700; color: #1B3A5C; }

    .nav { display: flex; justify-content: space-between; padding-top: 24px; margin-top: 24px; border-top: 2px solid #F0F2F5; gap: 12px; flex-wrap: wrap; }

    .progress-track { background: #E8EDF2; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
    .progress-fill { background: linear-gradient(90deg, #2E5C8A, #1B3A5C); height: 100%; transition: width 0.3s; }

    .recommendation { padding: 14px 18px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
    .recommendation.critical { background: #FDEDEC; border-left: 4px solid #E74C3C; color: #922B21; }
    .recommendation.warning  { background: #FEF9E7; border-left: 4px solid #F39C12; color: #7D5A00; }
    .recommendation.success  { background: #EAFAF1; border-left: 4px solid #27AE60; color: #1E8449; }
    .recommendation strong { display: block; margin-bottom: 4px; font-weight: 700; }

    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .pill { padding: 8px 14px; border: 2px solid #E8EDF2; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; background: #fff; color: #1B3A5C; }
    .pill:hover { border-color: #2E5C8A; background: #F7F9FC; }
    .pill.selected { background: linear-gradient(135deg, #1B3A5C, #2E5C8A); color: white; border-color: #1B3A5C; }

    .heat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    @media (max-width: 900px) { .heat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .heat-grid { grid-template-columns: repeat(2, 1fr); } }
    .heat-cell { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; color: #fff; text-align: center; }
    .heat-cell .num { font-size: 28px; font-weight: 800; line-height: 1; }
    .heat-cell .lab { font-size: 11px; opacity: 0.95; margin-top: 4px; }
    .heat-name { font-size: 12px; font-weight: 600; color: #1B3A5C; text-align: center; margin-top: 8px; }

    .footer-tagline { text-align: center; padding: 16px; color: #5D6D7E; font-size: 12px; font-style: italic; background: #F7F9FC; }

    /* ---- Loading splash ---- */
    .loading-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: linear-gradient(135deg, #F5F7FA 0%, #E8EDF2 100%); z-index: 9999;
    }
    .loading-splash .badge {
      background: linear-gradient(135deg, #1B3A5C, #2E5C8A);
      color: #fff; padding: 14px 22px; border-radius: 14px;
      font-weight: 800; font-size: 22px; box-shadow: 0 10px 30px rgba(27,58,92,0.15);
    }
    .loading-splash .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 3px solid rgba(27,58,92,0.15); border-top-color: #1B3A5C;
      animation: spin 0.9s linear infinite;
    }
    .loading-splash .sub { font-size: 13px; color: #5D6D7E; }
    .loading-splash .err {
      max-width: 460px; padding: 12px 16px; margin-top: 8px;
      background: #FDEDEC; border-left: 4px solid #E74C3C;
      border-radius: 10px; color: #922B21; font-size: 13px; line-height: 1.5;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash" class="loading-splash">
    <div class="badge">Adesso AI Readiness Check</div>
    <div class="spinner"></div>
    <div class="sub">Loading…</div>
    <div id="splash-err" class="err">
      Could not load required libraries. If you are on a corporate network, please allow
      <code>cdn.jsdelivr.net</code> and <code>unpkg.com</code> and refresh.
    </div>
  </div>

  <div id="root"></div>

  <script>
    window.__splashErrTimer = setTimeout(function(){
      var e = document.getElementById('splash-err');
      if (e && document.getElementById('splash')) e.style.display = 'block';
    }, 8000);
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ============================================================
     *  Auth (client-side)
     * ============================================================ */
    const ALLOWED_USERS = [
      { email: 'roman.borvitz@adesso-group.com', password: 'R0man@Adesso2026!', name: 'Roman Borvitz' }
    ];
    const AUTH_KEY = 'adesso_ai_readiness_auth';

    /* ============================================================
     *  Storage
     * ============================================================ */
    const STORAGE_KEYS = {
      RESPONSES: 'adesso_ai_readiness_responses',
      PROGRESS:  'adesso_ai_readiness_progress'
    };
    const storage = {
      getAllResponses() { try { const d = localStorage.getItem(STORAGE_KEYS.RESPONSES); return d ? JSON.parse(d) : []; } catch { return []; } },
      saveResponse(r)   {
        const list = storage.getAllResponses();
        const item = { ...r, id: Date.now(), date: new Date().toISOString() };
        list.push(item);
        try { localStorage.setItem(STORAGE_KEYS.RESPONSES, JSON.stringify(list)); } catch {}
        return item;
      },
      saveProgress(p)   { try { localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(p)); } catch {} },
      getProgress()     { try { const d = localStorage.getItem(STORAGE_KEYS.PROGRESS); return d ? JSON.parse(d) : null; } catch { return null; } },
      clearProgress()   { try { localStorage.removeItem(STORAGE_KEYS.PROGRESS); } catch {} },
      exportToCSV(list) {
        const header = 'Date,Company,Contact,Email,Overall Score,Maturity Level,Strategy,Data,Tech,People,Governance,Innovation\n';
        const rows = list.map(r => {
          const s = r.categoryScores.reduce((a, c) => ({ ...a, [c.id]: c.score }), {});
          return [
            r.date, '"' + (r.companyName || '') + '"', '"' + (r.contactName || '') + '"',
            r.email || '', r.overallScore, '"' + (r.maturityLevel || '') + '"',
            s.strategy || 0, s.data || 0, s.tech || 0, s.people || 0, s.governance || 0, s.innovation || 0
          ].join(',');
        }).join('\n');
        const blob = new Blob([header + rows], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'adesso_ai_readiness_' + Date.now() + '.csv'; a.click();
      }
    };

    /* ============================================================
     *  Data
     * ============================================================ */
    const sections = [
      { id: 'strategy',   label: 'Strategy',   short: 'Strategy & Vision',     description: 'Strategic alignment of AI initiatives with business objectives' },
      { id: 'data',       label: 'Data',       short: 'Data Maturity',         description: 'Quality, accessibility, and governance of organizational data' },
      { id: 'tech',       label: 'Tech',       short: 'Technology Stack',      description: 'Infrastructure and tools supporting AI implementation' },
      { id: 'people',     label: 'People',     short: 'People & Culture',      description: 'Skills, training, and cultural readiness for AI adoption' },
      { id: 'governance', label: 'Governance', short: 'Governance & Ethics',   description: 'Ethical frameworks and compliance for AI deployment' },
      { id: 'innovation', label: 'Innovation', short: 'Innovation Capability', description: 'Capacity for experimentation and technology adoption' }
    ];

    const questions = [
      { id: 1,  category: 'strategy',   text: 'Does your organization have a clearly defined AI strategy aligned with business objectives?', weight: 3, helpText: 'Documented AI roadmap, alignment with business KPIs, executive sponsorship' },
      { id: 2,  category: 'strategy',   text: 'Is there executive sponsorship and budget allocated for AI initiatives?', weight: 3, helpText: 'Dedicated AI budget, C-level champion, clear ownership' },
      { id: 3,  category: 'data',       text: 'Do you have a centralized data infrastructure (data lake / warehouse)?', weight: 2, helpText: 'Modern platforms like Snowflake, Databricks, BigQuery, SAP Datasphere, etc.' },
      { id: 4,  category: 'data',       text: 'Is your data quality monitored and governed systematically?', weight: 3, helpText: 'Data quality tools, data governance frameworks, regular audits' },
      { id: 5,  category: 'data',       text: 'Can you access historical data for at least 2 years across key business areas?', weight: 2, helpText: 'Historical data availability for training ML models' },
      { id: 6,  category: 'tech',       text: 'Does your IT infrastructure support cloud computing and scalable processing?', weight: 2, helpText: 'Cloud presence (AWS, Azure, GCP), elastic compute, containerization' },
      { id: 7,  category: 'tech',       text: 'Do you have APIs and integration capabilities for AI tools?', weight: 2, helpText: 'API management, microservices architecture, integration platforms' },
      { id: 8,  category: 'people',     text: 'Do you have data scientists or AI specialists on staff?', weight: 3, helpText: 'In-house ML engineers, data scientists, or AI specialists' },
      { id: 9,  category: 'people',     text: 'Are employees trained in basic AI / ML concepts?', weight: 2, helpText: 'AI literacy programs, training initiatives, workshops' },
      { id: 10, category: 'people',     text: 'Is there a culture of data-driven decision making?', weight: 2, helpText: 'Data-informed decisions, analytics-first mindset, KPI culture' },
      { id: 11, category: 'governance', text: 'Do you have ethical AI guidelines and bias monitoring processes?', weight: 3, helpText: 'AI ethics committee, bias detection tools, responsible AI policies' },
      { id: 12, category: 'governance', text: 'Are data privacy and compliance frameworks in place (GDPR, etc.)?', weight: 3, helpText: 'GDPR, CCPA, HIPAA compliance, privacy by design' },
      { id: 13, category: 'innovation', text: 'Have you implemented any AI / ML proof of concepts or pilots?', weight: 2, helpText: 'Production AI systems, PoCs, pilot programs' },
      { id: 14, category: 'innovation', text: 'Is there a process for evaluating and adopting new technologies?', weight: 2, helpText: 'Innovation labs, tech radar, evaluation frameworks' },
      { id: 15, category: 'innovation', text: 'Does your organization measure ROI on technology investments?', weight: 2, helpText: 'Defined KPIs, ROI tracking, business value measurement' }
    ];

    const responseOptions = [
      { value: 0, label: 'Not at all', desc: 'No formal approach or capability' },
      { value: 1, label: 'Minimal',    desc: 'Basic awareness, limited implementation' },
      { value: 2, label: 'Partially',  desc: 'Some processes in place, inconsistent' },
      { value: 3, label: 'Mostly',     desc: 'Well-established, room for optimization' },
      { value: 4, label: 'Fully',      desc: 'Best-in-class, fully mature' }
    ];

    /* ============================================================
     *  Scoring
     * ============================================================ */
    function calcCategory(cid, answers) {
      const qs = questions.filter(q => q.category === cid);
      const tw = qs.reduce((s, q) => s + q.weight, 0);
      const ws = qs.reduce((s, q) => s + ((answers[q.id] ?? 0) * q.weight), 0);
      if (tw === 0) return 0;
      return Math.round((ws / (tw * 4)) * 100);
    }
    function calcOverall(answers) {
      const s = sections.map(c => calcCategory(c.id, answers));
      return Math.round(s.reduce((a, b) => a + b, 0) / s.length);
    }
    function maturity(score) {
      if (score >= 80) return { level: 'AI Pioneer',  desc: 'Leading the way in AI transformation',  detail: 'Your organization demonstrates exceptional AI maturity across all dimensions. You are well-positioned to leverage AI for competitive advantage.', percentile: 'Top 10%' };
      if (score >= 60) return { level: 'AI Adopter',  desc: 'Actively implementing AI solutions',    detail: 'Solid AI foundations and active implementation. Focus on scaling successful initiatives and closing remaining capability gaps.', percentile: 'Top 25%' };
      if (score >= 40) return { level: 'AI Explorer', desc: 'Exploring AI opportunities',            detail: 'You have some foundational capabilities. Now is the time to develop a strategic roadmap and build core competencies.', percentile: 'Top 50%' };
      if (score >= 20) return { level: 'AI Aware',    desc: 'Beginning AI awareness journey',        detail: 'Early stage of AI awareness. Foundational data infrastructure and AI literacy should be priorities.', percentile: 'Bottom 50%' };
      return                  { level: 'AI Novice',   desc: 'Early stage of AI readiness',           detail: 'Just beginning the AI journey. Start with executive education, data foundations, and identifying high-value use cases.', percentile: 'Bottom 25%' };
    }
    function recommendationsFor(catScores) {
      const map = {
        strategy:   { type: 'critical', title: 'Develop a comprehensive AI strategy',         desc: 'Build a clear AI roadmap aligned with business goals. Define KPIs, allocate resources, and secure executive sponsorship.' },
        data:       { type: 'critical', title: 'Strengthen your data foundation',             desc: 'Invest in data quality, governance, and a central data platform (lake or warehouse) before scaling AI workloads.' },
        tech:       { type: 'warning',  title: 'Modernize your technology stack',             desc: 'Adopt cloud-native infrastructure, AI platforms, and a robust integration layer for AI/ML tools.' },
        people:     { type: 'warning',  title: 'Accelerate AI skills and culture',            desc: 'Run AI literacy programs, hire or partner for AI specialists, and embed data-driven decision making.' },
        governance: { type: 'critical', title: 'Establish AI governance and ethics',          desc: 'Define ethical AI guidelines, bias monitoring, and ensure GDPR/data privacy compliance for AI deployments.' },
        innovation: { type: 'warning',  title: 'Launch AI pilots and measure ROI',            desc: 'Start targeted PoCs with clear KPIs, embed an evaluation process, and track business value of tech investments.' }
      };
      const out = [];
      catScores.forEach(c => {
        if (c.score < 50 && map[c.id]) out.push({ ...map[c.id], catId: c.id, catLabel: c.short });
      });
      if (out.length === 0) {
        out.push({ type: 'success', title: 'Strong AI readiness across the board', desc: 'Your organization shows strong AI readiness in every dimension. Focus on scaling, governance maturity, and continuous innovation.' });
      }
      return out;
    }

    /* ============================================================
     *  Heat map helpers
     * ============================================================ */
    function heatColor(s) {
      if (s >= 67) return 'linear-gradient(135deg, #27AE60, #2ECC71)';
      if (s >= 34) return 'linear-gradient(135deg, #F39C12, #F1C40F)';
      return         'linear-gradient(135deg, #E74C3C, #EC7063)';
    }
    function heatLabel(s) {
      if (s >= 67) return 'Good';
      if (s >= 34) return 'Medium';
      return 'Critical';
    }

    /* ============================================================
     *  Login screen
     * ============================================================ */
    function LoginScreen({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const submit = (e) => {
        e && e.preventDefault();
        setLoading(true);
        setError('');
        setTimeout(() => {
          const m = ALLOWED_USERS.find(u =>
            u.email.toLowerCase() === email.trim().toLowerCase() && u.password === password
          );
          if (m) {
            try { sessionStorage.setItem(AUTH_KEY, JSON.stringify({ email: m.email, name: m.name, ts: Date.now() })); } catch {}
            onLogin(m);
          } else {
            setError('Invalid email or password. Please try again.');
            setLoading(false);
          }
        }, 250);
      };

      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: 'linear-gradient(135deg, #F5F7FA 0%, #E8EDF2 100%)', padding: 20
        }}>
          <div style={{
            background: '#fff', borderRadius: 24, boxShadow: '0 20px 60px rgba(27,58,92,0.15)',
            padding: 48, maxWidth: 480, width: '100%'
          }}>
            <div style={{ textAlign: 'center', marginBottom: 32 }}>
              <div style={{
                display: 'inline-block', background: 'linear-gradient(135deg, #1B3A5C, #2E5C8A)',
                color: '#fff', padding: '14px 22px', borderRadius: 16, fontSize: 22, fontWeight: 800,
                marginBottom: 16
              }}>
                Adesso AI Readiness Check
              </div>
              <p style={{ color: '#5D6D7E', fontSize: 14, margin: 0 }}>
                Sign in to access the assessment
              </p>
            </div>

            <form onSubmit={submit}>
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 6, fontSize: 14, fontWeight: 500, color: '#1B3A5C' }}>Email</label>
                <input
                  type="email" autoFocus className="input" placeholder="firstname.lastname@adesso-group.com"
                  value={email} onChange={e => setEmail(e.target.value)} disabled={loading}
                />
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', marginBottom: 6, fontSize: 14, fontWeight: 500, color: '#1B3A5C' }}>Password</label>
                <input
                  type="password" className="input" placeholder="••••••••"
                  value={password} onChange={e => setPassword(e.target.value)} disabled={loading}
                />
              </div>
              {error && <div className="alert danger" style={{ marginBottom: 16 }}>{error}</div>}
              <button type="submit" className="button button-block" disabled={loading}>
                {loading ? 'Signing in…' : 'Sign in'}

    /* ============================================================
     *  Unified Dashboard + Assessment view
     *  Single shell: header + progress + tabs (Profile + 6 sections)
     * ============================================================ */
    function AssessmentForm({ user, onComplete, onLogout, onShowAnalytics }) {
      // Tabs: profile + the 6 assessment sections
      const allTabs = [{ id: 'profile', label: 'Profile', short: 'Company profile', description: 'Tell us about your organization to personalize the assessment.' }, ...sections];

      const [activeTab, setActiveTab] = useState('profile');
      const [companyName, setCompanyName] = useState('');
      const [contactName, setContactName] = useState(user?.name || '');
      const [email, setEmail] = useState('');
      const [answers, setAnswers] = useState({});
      const [showHelp, setShowHelp] = useState({});
      const [errors, setErrors] = useState({});

      // Restore in-progress draft on mount
      useEffect(() => {
        const p = storage.getProgress();
        if (p) {
          if (p.companyName) setCompanyName(p.companyName);
          if (p.contactName) setContactName(p.contactName);
          if (p.email) setEmail(p.email);
          if (p.answers) setAnswers(p.answers);
          if (p.activeTab) setActiveTab(p.activeTab);
        }
      }, []);

      // Auto-save
      useEffect(() => {
        if (companyName || email || Object.keys(answers).length > 0) {
          storage.saveProgress({ companyName, contactName, email, answers, activeTab });
        }
      }, [companyName, contactName, email, answers, activeTab]);

      const profileValid = companyName.trim() && email.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const totalQ = questions.length;
      const answered = Object.keys(answers).length;
      const percent = Math.round(((profileValid ? 1 : 0) * 5 + (answered / totalQ) * 95));

      const sectionDone = (sid) => sid === 'profile'
        ? profileValid
        : questions.filter(q => q.category === sid).every(q => answers[q.id] !== undefined);
      const allDone = profileValid && sections.every(s => sectionDone(s.id));

      const setAnswer = (qid, value) => setAnswers(prev => ({ ...prev, [qid]: value }));

      const goNext = () => {
        const idx = allTabs.findIndex(t => t.id === activeTab);

        // Validate profile before allowing to leave it
        if (activeTab === 'profile') {
          const ne = {};
          if (!companyName.trim()) ne.companyName = 'Company name is required';
          if (!email.trim()) ne.email = 'Email is required';
          else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) ne.email = 'Please enter a valid email';
          setErrors(ne);
          if (Object.keys(ne).length > 0) return;
        }

        if (idx < allTabs.length - 1) setActiveTab(allTabs[idx + 1].id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      const goPrev = () => {
        const idx = allTabs.findIndex(t => t.id === activeTab);
        if (idx > 0) setActiveTab(allTabs[idx - 1].id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      const submitAll = () => {
        storage.clearProgress();
        onComplete({ companyName, contactName, email, answers });
      };

      const tab = allTabs.find(t => t.id === activeTab);
      const tabIdx = allTabs.findIndex(t => t.id === activeTab);
      const isProfile = activeTab === 'profile';
      const sectionQuestions = isProfile ? [] : questions.filter(q => q.category === activeTab);

              </div>

              <div className="progress-track">
                <div className="progress-fill" style={{ width: percent + '%' }} />
              </div>

              <div className="tabs">
                {allTabs.map(t => (
                  <button
                    key={t.id}
                    className={'tab' + (t.id === activeTab ? ' active' : '') + (sectionDone(t.id) ? ' complete' : '')}

              </div>

              <div className="section-title">
                {tab.short}
                <span className="section-badge">Step {tabIdx + 1} of {allTabs.length}</span>
              </div>

                  <div className="grid-3" style={{ marginBottom: 16 }}>

                      <div className="info-card-value">15</div>
                    </div>
                    <div className="info-card">
                      <div className="info-card-label">Maturity dimensions</div>
                      <div className="info-card-value">6</div>
                    </div>
                    <div className="info-card">
                      <div className="info-card-label">Estimated time</div>
                      <div className="info-card-value">~5 min</div>
                    </div>

                      </div>
                    </div>
                    <div>
                      <div className="q-block" style={{ borderBottom: 'none', padding: '8px 0' }}>
                        <label className="q-label">Business email <span style={{ color: '#E74C3C' }}>*</span></label>
                        <input className="input" type="email" placeholder="firstname.lastname@adesso-group.com"
                          value={email} onChange={e => setEmail(e.target.value)} />

                      </div>
                    </div>
                  </div>

                  <div className="q-block" style={{ borderBottom: 'none', padding: '8px 0' }}>
                    <label className="q-label">Company name <span style={{ color: '#E74C3C' }}>*</span></label>
                    <input className="input" placeholder="Your company"
                      value={companyName} onChange={e => setCompanyName(e.target.value)} />
                    {errors.companyName && <div className="alert danger" style={{ marginTop: 8, padding: '8px 12px' }}>{errors.companyName}</div>}
                  </div>
                </>

                sectionQuestions.map(q => (
                  <div className="q-block" key={q.id}>
                    <div className="q-label">
                      {q.text}

                        <span

                        <button

                          title={opt.desc}

              <div className="nav">
                <button className="button button-secondary" onClick={goPrev} disabled={tabIdx === 0}>

                  <button className="button" onClick={goNext}>

            <div className="footer-tagline">Your progress is auto-saved locally · 100% confidential</div>
          </div>

        setReady(true);
        const sp = document.getElementById('splash');
        if (sp) sp.remove();
        if (window.__splashErrTimer) clearTimeout(window.__splashErrTimer);
      }, []);

      const handleLogin = (u) => setUser(u);
      const handleLogout = () => {
        try { sessionStorage.removeItem(AUTH_KEY); } catch {}
        setUser(null); setStep('landing'); setShowAnalytics(false);
      };
      const handleStart = ({ companyName, email, contactName }) => {
        setCompanyName(companyName); setEmail(email); setContactName(contactName);
        setStep('assessment');
      };
      const handleComplete = (a) => {
        setAnswers(a); setStep('results'); setResponses(storage.getAllResponses());
      };
      const handleRestart = () => {
        setStep('landing'); setCompanyName(''); setEmail(''); setContactName(''); setAnswers({});
      };
      const handleShowAnalytics = () => { setResponses(storage.getAllResponses()); setShowAnalytics(true); };

      if (!ready) return null;
      if (!user) return <LoginScreen onLogin={handleLogin} />;
      if (showAnalytics) return <Analytics responses={responses} user={user} onLogout={handleLogout} onClose={() => setShowAnalytics(false)} />;
      if (step === 'landing')   return <LandingPage user={user} onStart={handleStart} onShowAnalytics={handleShowAnalytics} onLogout={handleLogout} />;
      if (step === 'assessment') return <AssessmentForm user={user} companyName={companyName} contactName={contactName} email={email} onComplete={handleComplete} onLogout={handleLogout} />;
      return <ResultsPage user={user} companyName={companyName} contactName={contactName} email={email} answers={answers} onRestart={handleRestart} onShowAnalytics={handleShowAnalytics} onLogout={handleLogout} />;
    }

    function bootstrap() {
      if (!window.React || !window.ReactDOM) return setTimeout(bootstrap, 100);
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      } catch (e) {
        const err = document.getElementById('splash-err');
        if (err) { err.style.display = 'block'; err.textContent = 'Render error: ' + e.message; }
      }
    }
    bootstrap();
  </script>
</body>
</html>
