<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adesso · AI Readiness Assessment</title>
  <meta name="description" content="Adesso AI Readiness Assessment — discover your organization's AI maturity in 5 minutes." />

  <!-- Tailwind via Play CDN (jsdelivr mirror as fallback) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    // Fallback to legacy Tailwind CDN if v4 browser bundle didn't load
    setTimeout(function(){
      if (!window.tailwind && !document.querySelector('[data-tw-loaded]')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.tailwindcss.com';
        s.setAttribute('data-tw-loaded','1');
        document.head.appendChild(s);
      }
    }, 800);
  </script>

  <!-- React + ReactDOM (jsdelivr CDN, with unpkg fallback) -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/react@18.3.1/umd/react.production.min.js';"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js';"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/@babel/standalone@7.25.6/babel.min.js';"></script>

  <style>
    /* Baseline so something renders even if Tailwind is blocked */
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
      color: #fff;
    }
    .loading-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
      z-index: 9999;
    }
    .loading-splash .logo {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 28px; color: #fff;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }
    .loading-splash .title { font-size: 22px; font-weight: 700; }
    .loading-splash .sub   { font-size: 13px; color: #93c5fd; }
    .loading-splash .spinner {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #60a5fa;
      animation: spin 0.9s linear infinite;
    }
    .loading-splash .err {
      max-width: 460px; padding: 12px 16px; margin-top: 8px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px; color: #fecaca; font-size: 13px; line-height: 1.5;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Pre-render loading splash so the user always sees something -->
  <div id="splash" class="loading-splash">
    <div class="logo">a</div>
    <div class="title">adesso · AI Readiness</div>
    <div class="spinner"></div>
    <div class="sub">Loading assessment…</div>
    <div id="splash-err" class="err">
      Couldn't load required libraries. If you're on a corporate network, please allow access to
      <code>cdn.jsdelivr.net</code>, <code>unpkg.com</code> and
      <code>cdn.tailwindcss.com</code>, then refresh.
    </div>
  </div>

  <div id="root"></div>

  <script>
    // After 8s, if React still hasn't mounted, show the network help message
    window.__splashErrTimer = setTimeout(function() {
      var splashErr = document.getElementById('splash-err');
      if (splashErr && document.getElementById('splash')) splashErr.style.display = 'block';
    }, 8000);
  </script>

  <script type="text/babel" data-presets="react,typescript">
    const { useState, useEffect } = React;

    /* ============================================================
     *  Inline SVG icons (no external dependency on lucide-react)
     * ============================================================ */
    const baseIconProps = {

    const Icon = ({ className = 'w-5 h-5', children }) => (

    const ChevronRight  = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
    const ChevronLeft   = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
    const Download      = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></Icon>;
    const Mail          = (p) => <Icon {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></Icon>;
    const BarChart3     = (p) => <Icon {...p}><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></Icon>;
    const Brain         = (p) => <Icon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></Icon>;
    const Target        = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></Icon>;
    const Award         = (p) => <Icon {...p}><circle cx="12" cy="8" r="6" /><polyline points="15.477 12.89 17 22 12 19 7 22 8.523 12.89" /></Icon>;
    const TrendingUp    = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></Icon>;
    const AlertCircle   = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></Icon>;
    const CheckCircle2  = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Icon>;
    const Shield        = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></Icon>;
    const Database      = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M3 5v14a9 3 0 0 0 18 0V5" /><path d="M3 12a9 3 0 0 0 18 0" /></Icon>;
    const Users         = (p) => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></Icon>;
    const Cog           = (p) => <Icon {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></Icon>;
    const Lightbulb     = (p) => <Icon {...p}><path d="M9 18h6" /><path d="M10 22h4" /><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14" /></Icon>;
    const Sparkles      = (p) => <Icon {...p}><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z" /></Icon>;
    const Clock         = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Icon>;
    const ShieldCheck   = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="m9 12 2 2 4-4" /></Icon>;
    const HelpCircle    = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></Icon>;
    const Save          = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></Icon>;
    const Star          = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></Icon>;
    const Calendar      = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></Icon>;
    const Send          = (p) => <Icon {...p}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></Icon>;
    const X             = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;
    const ArrowUp       = (p) => <Icon {...p}><line x1="12" y1="19" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" /></Icon>;
    const Lock          = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Icon>;
    const LogOut        = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></Icon>;

    /* ============================================================
     *  Allowed credentials (client-side gate)
     * ============================================================ */
    const ALLOWED_USERS = [
      { email: 'roman.borvitz@adesso-group.com', password: 'R0man@Adesso2026!' }
    ];
    const AUTH_KEY = 'ai_assessment_auth';

    /* ============================================================
     *  Storage helpers
     * ============================================================ */
    const STORAGE_KEYS = {
      RESPONSES: 'ai_assessment_responses',
      PROGRESS: 'ai_assessment_progress'
    };
    const storage = {
      getAllResponses() { try { const d = localStorage.getItem(STORAGE_KEYS.RESPONSES); return d ? JSON.parse(d) : []; } catch { return []; } },
      saveResponse(response) {
        const responses = storage.getAllResponses();
        const newResponse = { ...response, id: Date.now(), date: new Date().toISOString() };
        responses.push(newResponse);
        try { localStorage.setItem(STORAGE_KEYS.RESPONSES, JSON.stringify(responses)); } catch {}
        return newResponse;
      },
      saveProgress(progress) { try { localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(progress)); } catch {} },
      getProgress() { try { const d = localStorage.getItem(STORAGE_KEYS.PROGRESS); return d ? JSON.parse(d) : null; } catch { return null; } },
      clearProgress() { try { localStorage.removeItem(STORAGE_KEYS.PROGRESS); } catch {} },
      exportToCSV(responses) {
        const csvHeader = 'Date,Company,Contact,Email,Overall Score,Maturity Level,Strategy,Data,Tech,People,Governance,Innovation\n';
        const csvRows = responses.map(r => {
          const scores = r.categoryScores.reduce((acc, c) => ({ ...acc, [c.id]: c.score }), {});
          return `${r.date},"${r.companyName}","${r.contactName || ''}",${r.email},${r.overallScore},${r.maturityLevel || ''},${scores.strategy || 0},${scores.data || 0},${scores.tech || 0},${scores.people || 0},${scores.governance || 0},${scores.innovation || 0}`;
        }).join('\n');
        const blob = new Blob([csvHeader + csvRows], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `adesso_ai_assessment_${Date.now()}.csv`;
        a.click();
      }
    };
    const analytics = {
      init() { if (typeof window !== 'undefined') window.assessmentAnalytics = { sessionStart: Date.now(), events: [] }; },
      trackPageView(p) { if (window.assessmentAnalytics) window.assessmentAnalytics.events.push({ type: 'pageview', page: p, timestamp: Date.now() }); },
      trackEvent(n, d = {}) { if (window.assessmentAnalytics) window.assessmentAnalytics.events.push({ type: 'event', name: n, data: d, timestamp: Date.now() }); }
    };

    /* ============================================================
     *  Data
     * ============================================================ */
    const categories = [
      { id: 'strategy',   name: 'Strategy & Vision',     icon: Target,    color: 'from-blue-500 to-blue-600',     description: 'Strategic alignment of AI initiatives with business objectives' },
      { id: 'data',       name: 'Data Maturity',         icon: Database,  color: 'from-purple-500 to-purple-600', description: 'Quality, accessibility, and governance of organizational data' },
      { id: 'tech',       name: 'Technology Stack',      icon: Cog,       color: 'from-green-500 to-green-600',   description: 'Infrastructure and tools supporting AI implementation' },
      { id: 'people',     name: 'People & Culture',      icon: Users,     color: 'from-orange-500 to-orange-600', description: 'Skills, training, and cultural readiness for AI adoption' },
      { id: 'governance', name: 'Governance & Ethics',   icon: Shield,    color: 'from-red-500 to-red-600',       description: 'Ethical frameworks and compliance for AI deployment' },
      { id: 'innovation', name: 'Innovation Capability', icon: Lightbulb, color: 'from-yellow-500 to-yellow-600', description: 'Capacity for experimentation and technology adoption' }
    ];
    const questions = [
      { id: 1,  category: 'strategy',   text: 'Does your organization have a clearly defined AI strategy aligned with business objectives?', weight: 3, helpText: 'Look for documented AI roadmap, alignment with business KPIs, and executive sponsorship' },
      { id: 2,  category: 'strategy',   text: 'Is there executive sponsorship and budget allocated for AI initiatives?', weight: 3, helpText: 'Dedicated AI budget, C-level champion, and clear ownership' },
      { id: 3,  category: 'data',       text: 'Do you have a centralized data infrastructure (data lake/warehouse)?', weight: 2, helpText: 'Modern data platforms like Snowflake, Databricks, BigQuery, or similar' },
      { id: 4,  category: 'data',       text: 'Is your data quality monitored and governed systematically?', weight: 3, helpText: 'Data quality tools, data governance frameworks, regular audits' },
      { id: 5,  category: 'data',       text: 'Can you access historical data for at least 2 years across key business areas?', weight: 2, helpText: 'Historical data availability for training ML models' },
      { id: 6,  category: 'tech',       text: 'Does your IT infrastructure support cloud computing and scalable processing?', weight: 2, helpText: 'Cloud presence (AWS, Azure, GCP), elastic compute, containerization' },
      { id: 7,  category: 'tech',       text: 'Do you have APIs and integration capabilities for AI tools?', weight: 2, helpText: 'API management, microservices architecture, integration platforms' },
      { id: 8,  category: 'people',     text: 'Do you have data scientists or AI specialists on staff?', weight: 3, helpText: 'In-house ML engineers, data scientists, or AI specialists' },
      { id: 9,  category: 'people',     text: 'Are employees trained in basic AI/ML concepts?', weight: 2, helpText: 'AI literacy programs, training initiatives, workshops' },
      { id: 10, category: 'people',     text: 'Is there a culture of data-driven decision making?', weight: 2, helpText: 'Data-informed decisions, analytics-first mindset, KPI culture' },
      { id: 11, category: 'governance', text: 'Do you have ethical AI guidelines and bias monitoring processes?', weight: 3, helpText: 'AI ethics committee, bias detection tools, responsible AI policies' },
      { id: 12, category: 'governance', text: 'Are data privacy and compliance frameworks in place (GDPR, etc.)?', weight: 3, helpText: 'GDPR, CCPA, HIPAA compliance, privacy by design' },
      { id: 13, category: 'innovation', text: 'Have you implemented any AI/ML proof of concepts or pilots?', weight: 2, helpText: 'Production AI systems, PoCs, pilot programs' },
      { id: 14, category: 'innovation', text: 'Is there a process for evaluating and adopting new technologies?', weight: 2, helpText: 'Innovation labs, tech radar, evaluation frameworks' },
      { id: 15, category: 'innovation', text: 'Does your organization measure ROI on technology investments?', weight: 2, helpText: 'Defined KPIs, ROI tracking, business value measurement' }
    ];
    const responseOptions = [
      { value: 0, label: 'Not at all', description: 'No formal approach or capability',         color: 'bg-red-500' },
      { value: 1, label: 'Minimal',    description: 'Basic awareness, limited implementation', color: 'bg-orange-500' },
      { value: 2, label: 'Partially',  description: 'Some processes in place, inconsistent',   color: 'bg-yellow-500' },
      { value: 3, label: 'Mostly',     description: 'Well-established, room for optimization', color: 'bg-blue-500' },
      { value: 4, label: 'Fully',      description: 'Best-in-class, fully mature',             color: 'bg-green-500' }
    ];

    /* ============================================================
     *  Scoring
     * ============================================================ */
    function calculateCategoryScore(categoryId, answers) {
      const cq = questions.filter(q => q.category === categoryId);
      const tw = cq.reduce((s, q) => s + q.weight, 0);
      const ws = cq.reduce((s, q) => s + ((answers[q.id] || 0) * q.weight), 0);
      return Math.round((ws / (tw * 4)) * 100);
    }
    function calculateOverallScore(answers) {
      const s = categories.map(c => calculateCategoryScore(c.id, answers));
      return Math.round(s.reduce((a, b) => a + b, 0) / s.length);
    }
    function getMaturityLevel(score) {
      if (score >= 80) return { level: 'AI Pioneer',  color: 'from-green-500 to-emerald-600', bgColor: 'bg-green-500/20',  description: 'Leading the way in AI transformation', detailedDescription: 'Your organization demonstrates exceptional AI maturity with strong capabilities across all dimensions. You are well-positioned to leverage AI for competitive advantage and innovation.', percentile: 'Top 10%' };
      if (score >= 60) return { level: 'AI Adopter',  color: 'from-blue-500 to-cyan-600',     bgColor: 'bg-blue-500/20',   description: 'Actively implementing AI solutions',     detailedDescription: 'Your organization has solid AI foundations and is actively implementing AI solutions. Focus on scaling successful initiatives and addressing remaining capability gaps.', percentile: 'Top 25%' };
      if (score >= 40) return { level: 'AI Explorer', color: 'from-yellow-500 to-orange-500', bgColor: 'bg-yellow-500/20', description: 'Exploring AI opportunities',             detailedDescription: 'Your organization is exploring AI possibilities and has some foundational capabilities. Now is the time to develop a strategic roadmap and build core competencies.', percentile: 'Top 50%' };
      if (score >= 20) return { level: 'AI Aware',    color: 'from-orange-500 to-red-500',    bgColor: 'bg-orange-500/20', description: 'Beginning AI awareness journey',         detailedDescription: 'Your organization is in the early stages of AI awareness. Building foundational data infrastructure and AI literacy should be priorities.', percentile: 'Bottom 50%' };
      return                  { level: 'AI Novice',   color: 'from-red-500 to-pink-600',      bgColor: 'bg-red-500/20',    description: 'Early stage of AI readiness',            detailedDescription: 'Your organization is just beginning the AI journey. Start with executive education, data foundations, and identifying high-value use cases.', percentile: 'Bottom 25%' };
    }
    function getRecommendations(score, categoryScores) {
      const map = {
        strategy:   { title: 'Develop Comprehensive AI Strategy',     desc: "Engage Adesso's strategy consultants to create a comprehensive AI roadmap aligned with your business goals. Define clear KPIs, allocate resources, and establish executive sponsorship.", priority: 'High',   timeline: '3-6 months',  impact: 'High' },
        data:       { title: 'Build Robust Data Foundation',          desc: "Implement modern data infrastructure with Adesso's data engineering expertise. Focus on data quality, governance, and accessibility across business units.",                                priority: 'High',   timeline: '6-12 months', impact: 'Critical' },
        tech:       { title: 'Modernize Technology Stack',            desc: "Upgrade your technology infrastructure with cloud-native solutions, AI platforms, and modern integration capabilities. Adesso can guide your cloud transformation.",                            priority: 'Medium', timeline: '6-12 months', impact: 'High' },
        people:     { title: 'Accelerate AI Skills Development',      desc: "Implement comprehensive training programs and consider Adesso's talent augmentation services. Build internal AI literacy and recruit specialized talent.",                                       priority: 'High',   timeline: '3-6 months',  impact: 'High' },
        governance: { title: 'Establish AI Governance Framework',     desc: "Develop ethical AI guidelines, bias monitoring, and compliance frameworks with Adesso's governance specialists. Ensure responsible AI deployment.",                                              priority: 'High',   timeline: '3-6 months',  impact: 'Critical' },
        innovation: { title: 'Launch Innovation Initiatives',          desc: "Start AI pilot projects with Adesso's innovation lab and proven methodologies. Build a culture of experimentation and rapid prototyping.",                                                       priority: 'Medium', timeline: '3-9 months',  impact: 'High' }
      };
      const out = [];
      categoryScores.filter(c => c.score < 50).forEach(a => { if (map[a.id]) out.push({ ...map[a.id], categoryId: a.id, categoryName: a.name }); });
      return out;
    }
    function getStrengths(categoryScores) {
      return categoryScores.filter(c => c.score >= 70).map(c => ({ name: c.name, score: c.score }));
    }

    /* ============================================================
     *  HeatMap
     * ============================================================ */
    function HeatMap({ categoryScores }) {
      const getColor = s => s >= 80 ? 'bg-green-500' : s >= 60 ? 'bg-blue-500' : s >= 40 ? 'bg-yellow-500' : s >= 20 ? 'bg-orange-500' : 'bg-red-500';
      const getLabel = s => s >= 80 ? 'Excellent' : s >= 60 ? 'Good' : s >= 40 ? 'Fair' : s >= 20 ? 'Needs Work' : 'Critical';
      return (
        <div className="bg-white/5 backdrop-blur-md rounded-2xl p-8 border border-white/10 mb-8">
          <h3 className="text-2xl font-bold mb-6">Maturity Heat Map</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
            {categoryScores.map(cat => {
              const CatIcon = cat.icon;
              return (
                <div key={cat.id} className="text-center">
                  <div className={`aspect-square ${getColor(cat.score)} rounded-xl flex flex-col items-center justify-center p-4 mb-2 transition-all hover:scale-105`}>
                    <CatIcon className="w-6 h-6 mb-2" />

    /* ============================================================
     *  AssessmentForm
     * ============================================================ */
    function AssessmentForm({ onComplete, companyName }) {
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [answers, setAnswers] = useState({});
      const [showHelp, setShowHelp] = useState(false);
      const [savedNotification, setSavedNotification] = useState(false);

      useEffect(() => {
        const p = storage.getProgress();
        if (p && p.companyName === companyName) { setAnswers(p.answers || {}); setCurrentQuestion(p.currentQuestion || 0); }
      }, [companyName]);

      useEffect(() => {
        if (Object.keys(answers).length > 0) {
          storage.saveProgress({ companyName, answers, currentQuestion });
          setSavedNotification(true);
          const t = setTimeout(() => setSavedNotification(false), 2000);
          return () => clearTimeout(t);
        }
      }, [answers, currentQuestion, companyName]);

      const question = questions[currentQuestion];
      const category = categories.find(c => c.id === question.category);
      const CatIcon = category.icon;
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      const answeredCount = Object.keys(answers).length;

      const handleAnswer = v => {
        const na = { ...answers, [question.id]: v };
        setAnswers(na);
        analytics.trackEvent('question_answered', { questionId: question.id, value: v });
        if (currentQuestion < questions.length - 1) setTimeout(() => setCurrentQuestion(currentQuestion + 1), 400);
      };
      const handleNext = () => { if (currentQuestion < questions.length - 1) setCurrentQuestion(currentQuestion + 1); };
      const handlePrevious = () => { if (currentQuestion > 0) setCurrentQuestion(currentQuestion - 1); };
      const handleSubmit = () => { storage.clearProgress(); analytics.trackEvent('assessment_completed', { totalAnswered: answeredCount }); onComplete(answers); };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white">
          <div className="container mx-auto px-6 py-12 max-w-4xl">
            <div className="mb-8">
              <div className="flex justify-between items-center mb-2">
                <div>
                  <span className="text-sm text-blue-200">Question {currentQuestion + 1} of {questions.length}</span>
                  {savedNotification && (<span className="ml-3 inline-flex items-center gap-1 text-xs text-green-400"><Save className="w-3 h-3" />Progress saved</span>)}
                </div>
                <div className="flex items-center gap-4">
                  <span className="text-sm text-blue-200">{answeredCount}/{questions.length} answered</span>
                  <span className="text-sm text-blue-200">{Math.round(progress)}% Complete</span>
                </div>
              </div>
              <div className="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500" style={{ width: `${progress}%` }} />
              </div>
              <div className="flex gap-1 mt-2">
                {questions.map((q, idx) => (
                  <button key={q.id} onClick={() => setCurrentQuestion(idx)} className={`h-1 flex-1 rounded-full transition-all ${idx === currentQuestion ? 'bg-blue-400' : answers[q.id] !== undefined ? 'bg-green-400' : 'bg-white/20'}`} title={`Question ${idx + 1}`} />
                ))}
              </div>
            </div>

            <div className="bg-white/5 backdrop-blur-md rounded-2xl p-8 border border-white/10">
              <div className="flex items-center justify-between mb-6">
                <div className={`inline-flex items-center gap-2 px-4 py-2 bg-gradient-to-r ${category.color} rounded-full`}>
                  <CatIcon className="w-4 h-4" />
                  <span className="text-sm font-semibold">{category.name}</span>
                </div>
                <button onClick={() => setShowHelp(!showHelp)} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-all" title="Show help">
                  <HelpCircle className="w-5 h-5" />
                </button>
              </div>
              <h2 className="text-3xl font-bold mb-3">{question.text}</h2>
              {showHelp && question.helpText && (
                <div className="mb-6 p-4 bg-blue-500/10 border border-blue-400/30 rounded-lg flex gap-3">
                  <AlertCircle className="w-5 h-5 text-blue-400 flex-shrink-0 mt-0.5" />
                  <p className="text-blue-100">{question.helpText}</p>
                </div>
              )}
              <p className="text-blue-200 mb-8">{category.description}</p>
              <div className="space-y-3">
                {responseOptions.map(option => (
                  <button key={option.value} onClick={() => handleAnswer(option.value)} className={`w-full p-4 rounded-xl border-2 transition-all text-left ${answers[question.id] === option.value ? 'border-blue-400 bg-blue-500/20 scale-[1.02]' : 'border-white/10 hover:border-white/30 hover:bg-white/5'}`}>
                    <div className="flex items-start gap-3">
                      <div className={`w-4 h-4 rounded-full ${option.color} mt-1 flex-shrink-0`} />
                      <div>
                        <div className="font-semibold text-lg">{option.label}</div>
                        <div className="text-sm text-blue-200">{option.description}</div>
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </div>

            <div className="flex justify-between mt-6">
              <button onClick={handlePrevious} disabled={currentQuestion === 0} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
                <ChevronLeft className="w-5 h-5" /> Previous
              </button>
              {currentQuestion === questions.length - 1 && answers[question.id] !== undefined ? (
                <button onClick={handleSubmit} className="px-8 py-3 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 rounded-lg transition-all flex items-center gap-2 font-bold">
                  View Results <ChevronRight className="w-5 h-5" />
                </button>
              ) : (
                <button onClick={handleNext} disabled={answers[question.id] === undefined} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
                  Next <ChevronRight className="w-5 h-5" />
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

              <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-500/20 rounded-full mb-4">
                <CheckCircle2 className="w-4 h-4 text-green-400" />
                <span className="text-sm text-green-300">Assessment Complete</span>
              </div>
              <h1 className="text-5xl font-bold mb-4">Your AI Readiness Report</h1>
              <p className="text-xl text-blue-100">Personalized insights for {companyName}</p>
              {contactName && <p className="text-blue-200 mt-2">Prepared for {contactName}</p>}
            </div>

            <div className={`bg-gradient-to-r ${maturity.color} rounded-3xl p-8 mb-8 shadow-2xl`}>
              <div className="flex flex-col lg:flex-row items-center justify-between gap-6">
                <div className="flex-1">
                  <div className="text-sm font-semibold mb-2 opacity-90">Your Maturity Level</div>
                  <h2 className="text-5xl font-bold mb-2">{maturity.level}</h2>
                  <p className="text-xl opacity-90 mb-4">{maturity.description}</p>
                  <p className="text-base opacity-80 max-w-2xl">{maturity.detailedDescription}</p>
                  <div className="mt-4 inline-flex items-center gap-2 px-3 py-1 bg-white/20 rounded-full">
                    <Star className="w-4 h-4" />
                    <span className="text-sm font-semibold">{maturity.percentile}</span>
                  </div>
                </div>
                <div className="text-center">
                  <div className="text-8xl font-bold mb-2">{overallScore}</div>
                  <div className="text-xl opacity-90">Overall Score</div>
                  <div className="text-sm opacity-75">/ 100</div>
                </div>
              </div>
            </div>

            {strengths.length > 0 && (
              <div className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 mb-8">
                <h3 className="text-2xl font-bold mb-4 flex items-center gap-2"><Award className="w-6 h-6 text-yellow-400" /> Your Strengths</h3>
                <div className="grid md:grid-cols-3 gap-4">
                  {strengths.map((s, idx) => (
                    <div key={idx} className="flex items-center gap-3 p-3 bg-green-500/10 border border-green-400/30 rounded-lg">
                      <CheckCircle2 className="w-5 h-5 text-green-400" />
                      <div>
                        <div className="font-semibold">{s.name}</div>
                        <div className="text-sm text-green-300">{s.score}/100</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
              {categoryScores.map(cat => {
                const CatIcon = cat.icon;
                return (
                  <div key={cat.id} className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 hover:border-white/30 transition-all">
                    <div className={`inline-flex items-center gap-2 px-3 py-1 bg-gradient-to-r ${cat.color} rounded-full mb-4`}>
                      <CatIcon className="w-4 h-4" />
                      <span className="text-sm font-semibold">{cat.name}</span>
                    </div>
                    <div className="flex items-end justify-between mb-3">
                      <div className="text-4xl font-bold">{cat.score}</div>
                      <div className="text-blue-200">/ 100</div>
                    </div>
                    <div className="w-full h-2 bg-white/10 rounded-full overflow-hidden mb-3">
                      <div className={`h-full bg-gradient-to-r ${cat.color} transition-all duration-1000`} style={{ width: `${cat.score}%` }} />
                    </div>
                    <div className="text-sm text-blue-200">{cat.score >= 70 ? '✓ Strong' : cat.score >= 50 ? '○ Developing' : '⚠ Needs Focus'}</div>
                  </div>
                );
              })}
            </div>

            <HeatMap categoryScores={categoryScores} />

            <div className="bg-white/5 backdrop-blur-md rounded-2xl p-8 border border-white/10 mb-8">
              <h3 className="text-2xl font-bold mb-6 flex items-center gap-2"><Lightbulb className="w-6 h-6 text-yellow-400" /> Recommended Actions</h3>
              <div className="space-y-4">
                {recommendations.length > 0 ? recommendations.map((rec, idx) => (
                  <div key={idx} className="flex gap-4 p-5 bg-white/5 rounded-xl border border-white/10 hover:border-white/30 transition-all">
                    <div className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center ${rec.priority === 'High' ? 'bg-red-500/20' : 'bg-yellow-500/20'}`}>
                      <AlertCircle className={`w-6 h-6 ${rec.priority === 'High' ? 'text-red-400' : 'text-yellow-400'}`} />
                    </div>
                    <div className="flex-1">
                      <div className="flex flex-wrap items-center gap-2 mb-2">
                        <h4 className="text-lg font-bold">{rec.title}</h4>
                        <span className={`text-xs px-2 py-1 rounded-full ${rec.priority === 'High' ? 'bg-red-500/20 text-red-300' : 'bg-yellow-500/20 text-yellow-300'}`}>{rec.priority} Priority</span>
                        <span className="text-xs px-2 py-1 rounded-full bg-blue-500/20 text-blue-300">{rec.timeline}</span>
                        <span className="text-xs px-2 py-1 rounded-full bg-purple-500/20 text-purple-300">{rec.impact} Impact</span>
                      </div>
                      <p className="text-blue-100">{rec.desc}</p>
                    </div>
                  </div>
                )) : (
                  <div className="text-center py-8">
                    <CheckCircle2 className="w-16 h-16 text-green-400 mx-auto mb-4" />
                    <p className="text-xl">Excellent! Your organization shows strong AI readiness across all dimensions.</p>
                  </div>
                )}
              </div>
            </div>

            <div className="bg-gradient-to-r from-red-500/20 to-orange-500/20 backdrop-blur-md rounded-2xl p-8 border border-red-500/30 mb-8">
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex-1">
                  <h3 className="text-2xl font-bold mb-2">Ready to Accelerate Your AI Journey?</h3>
                  <p className="text-blue-100 mb-4">Adesso's experts are ready to help you transform these insights into actionable results.</p>
                  <div className="flex flex-wrap gap-3 text-sm">
                    <span className="px-3 py-1 bg-white/10 rounded-full">Strategy Workshop</span>
                    <span className="px-3 py-1 bg-white/10 rounded-full">Data Assessment</span>
                    <span className="px-3 py-1 bg-white/10 rounded-full">PoC Development</span>
                    <span className="px-3 py-1 bg-white/10 rounded-full">Training Programs</span>
                  </div>
                </div>
                <div className="flex flex-col gap-3">
                  <button className="px-8 py-4 bg-white text-slate-900 hover:bg-blue-50 rounded-lg font-bold transition-all flex items-center gap-2 whitespace-nowrap">
                    <Calendar className="w-5 h-5" /> Schedule Consultation
                  </button>
                  <button onClick={() => setShowEmailCapture(true)} className="px-8 py-3 bg-white/20 hover:bg-white/30 rounded-lg font-semibold transition-all flex items-center gap-2 whitespace-nowrap">
                    <Mail className="w-5 h-5" /> Email Report
                  </button>
                </div>
              </div>
            </div>

            <div className="flex flex-wrap gap-4 justify-center">
              <button onClick={handleDownloadReport} className="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 rounded-lg transition-all flex items-center gap-2 font-bold">
                <Download className="w-5 h-5" /> Download Report
              </button>
              <button onClick={onRestart} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all">Take Another Assessment</button>
              <button onClick={onShowAnalytics} className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all flex items-center gap-2">
                <BarChart3 className="w-5 h-5" /> View Analytics
              </button>
            </div>
          </div>
          {showEmailCapture && <EmailCapture companyName={companyName} email={email} onClose={() => setShowEmailCapture(false)} />}
        </div>
      );
    }

    /* ============================================================
     *  AnalyticsDashboard
     * ============================================================ */
    function AnalyticsDashboard({ responses, onClose }) {
      if (responses.length === 0) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white p-6">
            <div className="max-w-6xl mx-auto">
              <div className="flex justify-between items-center mb-8">
                <h2 className="text-4xl font-bold">Analytics Dashboard</h2>
                <button onClick={onClose} className="p-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all"><X className="w-6 h-6" /></button>
              </div>
              <div className="text-center py-16">
                <BarChart3 className="w-24 h-24 mx-auto mb-6 text-blue-400 opacity-50" />
                <h2 className="text-3xl font-bold mb-4">No Assessments Yet</h2>
                <p className="text-xl text-blue-100 mb-8">Complete your first assessment to see analytics here.</p>
                <button onClick={onClose} className="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg font-bold">Take Assessment</button>
              </div>
            </div>
          </div>
        );
      }
      const avgScore = Math.round(responses.reduce((s, r) => s + r.overallScore, 0) / responses.length);
      const highestScore = Math.max(...responses.map(r => r.overallScore));
      const uniqueCompanies = new Set(responses.map(r => r.companyName)).size;
      const categoryAvgs = categories.map(cat => ({
        ...cat,
        avg: Math.round(responses.reduce((s, r) => {
          const cs = r.categoryScores.find(c => c.id === cat.id);
          return s + (cs ? cs.score : 0);
        }, 0) / responses.length)
      }));
      const maturityDistribution = responses.reduce((acc, r) => {
        const lvl = getMaturityLevel(r.overallScore).level;
        acc[lvl] = (acc[lvl] || 0) + 1; return acc;
      }, {});
      const handleExport = () => { storage.exportToCSV(responses); analytics.trackEvent('analytics_exported', { count: responses.length }); };
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white p-6">
          <div className="max-w-6xl mx-auto">
            <div className="flex justify-between items-center mb-8">
              <div>
                <h2 className="text-4xl font-bold">Analytics Dashboard</h2>
                <p className="text-blue-200 mt-1">Insights from {responses.length} assessments</p>
              </div>
              <div className="flex gap-3">
                <button onClick={handleExport} className="px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 rounded-lg transition-all flex items-center gap-2 font-bold">
                  <Download className="w-5 h-5" /> Export CSV
                </button>
                <button onClick={onClose} className="p-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all"><X className="w-6 h-6" /></button>
              </div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
              <StatCard label="Total Assessments" value={responses.length} icon={BarChart3} color="from-blue-500 to-blue-600" />
              <StatCard label="Average Score"     value={avgScore}          icon={Award}     color="from-purple-500 to-purple-600" />
              <StatCard label="Highest Score"     value={highestScore}      icon={ArrowUp}   color="from-green-500 to-emerald-600" />
              <StatCard label="Companies"         value={uniqueCompanies}   icon={Users}     color="from-orange-500 to-orange-600" />
            </div>
            <div className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 mb-8">
              <h3 className="text-2xl font-bold mb-4">Maturity Level Distribution</h3>
              <div className="space-y-3">
                {Object.entries(maturityDistribution).map(([lvl, count]) => {
                  const pct = Math.round((count / responses.length) * 100);
                  return (
                    <div key={lvl}>
                      <div className="flex justify-between mb-1">
                        <span className="font-semibold">{lvl}</span>
                        <span className="text-blue-200">{count} ({pct}%)</span>
                      </div>
                      <div className="w-full h-3 bg-white/10 rounded-full overflow-hidden">
                        <div className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-1000" style={{ width: pct + '%' }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-white/5 backdrop-blur-md rounded-2xl p-8 border border-white/10 mb-8">
              <h3 className="text-2xl font-bold mb-6">Category Performance (Average)</h3>
              <div className="space-y-4">
                {categoryAvgs.map(cat => {
                  const CatIcon = cat.icon;
                  return (
                    <div key={cat.id}>
                      <div className="flex justify-between items-center mb-2">
                        <div className="flex items-center gap-2"><CatIcon className="w-5 h-5" /><span className="font-semibold">{cat.name}</span></div>
                        <span className="font-bold text-2xl">{cat.avg}</span>
                      </div>
                      <div className="w-full h-3 bg-white/10 rounded-full overflow-hidden">
                        <div className={`h-full bg-gradient-to-r ${cat.color} transition-all duration-1000`} style={{ width: cat.avg + '%' }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-white/5 backdrop-blur-md rounded-2xl p-8 border border-white/10">
              <h3 className="text-2xl font-bold mb-6">Recent Assessments</h3>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-left border-b border-white/10">
                      <th className="pb-3 text-blue-200">Date</th>
                      <th className="pb-3 text-blue-200">Company</th>
                      <th className="pb-3 text-blue-200">Email</th>
                      <th className="pb-3 text-blue-200">Score</th>
                      <th className="pb-3 text-blue-200">Maturity</th>
                    </tr>
                  </thead>
                  <tbody>
                    {responses.slice(-10).reverse().map(r => {
                      const m = getMaturityLevel(r.overallScore);
                      return (
                        <tr key={r.id} className="border-b border-white/5">
                          <td className="py-3">{new Date(r.date).toLocaleDateString()}</td>
                          <td className="py-3 font-semibold">{r.companyName}</td>
                          <td className="py-3 text-blue-200">{r.email}</td>
                          <td className="py-3"><span className={`px-3 py-1 bg-gradient-to-r ${m.color} rounded-full text-sm font-bold`}>{r.overallScore}</span></td>
                          <td className="py-3">{m.level}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
     *  Main App
     * ============================================================ */
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);
      const [currentStep, setCurrentStep] = useState('landing');
      const [answers, setAnswers] = useState({});
      const [email, setEmail] = useState('');
      const [companyName, setCompanyName] = useState('');
      const [contactName, setContactName] = useState('');
      const [allResponses, setAllResponses] = useState([]);
      const [showAnalytics, setShowAnalytics] = useState(false);

      useEffect(() => {
        analytics.init();
        try {
          const raw = sessionStorage.getItem(AUTH_KEY);
          if (raw) {
            const stored = JSON.parse(raw);
            const known = ALLOWED_USERS.find(u => u.email.toLowerCase() === (stored.email || '').toLowerCase());
            if (known) setCurrentUser(known);
          }
        } catch {}
        setAuthChecked(true);
        analytics.trackPageView('landing');
        setAllResponses(storage.getAllResponses());
        // remove splash now that React mounted
        const splash = document.getElementById('splash');
        if (splash) splash.remove();
        if (window.__splashErrTimer) clearTimeout(window.__splashErrTimer);
      }, []);

      const handleLogin = (user) => { setCurrentUser(user); analytics.trackEvent('user_login', { email: user.email }); };
      const handleLogout = () => {
        try { sessionStorage.removeItem(AUTH_KEY); } catch {}
        setCurrentUser(null); setCurrentStep('landing'); setShowAnalytics(false);
      };
      const handleStartAssessment = (data) => {
        setCompanyName(data.companyName); setEmail(data.email); setContactName(data.contactName || '');
        setCurrentStep('assessment'); analytics.trackPageView('assessment');
      };
      const handleAssessmentComplete = (final) => {
        setAnswers(final); setCurrentStep('results');
        setAllResponses(storage.getAllResponses()); analytics.trackPageView('results');
      };
      const handleRestart = () => {
        setCurrentStep('landing'); setAnswers({}); setEmail(''); setCompanyName(''); setContactName('');
        analytics.trackPageView('landing');
      };
      const handleShowAnalytics = () => { setAllResponses(storage.getAllResponses()); setShowAnalytics(true); };

      if (!authChecked) return null;
      if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

      return (
        <div className="font-sans">
          {showAnalytics ? (
            <AnalyticsDashboard responses={allResponses} onClose={() => setShowAnalytics(false)} />
          ) : (
            <>
              {currentStep === 'landing' && (
                <LandingPage onStart={handleStartAssessment} onShowAnalytics={handleShowAnalytics} currentUser={currentUser} onLogout={handleLogout} />
              )}
              {currentStep === 'assessment' && (
                <AssessmentForm onComplete={handleAssessmentComplete} companyName={companyName} />
              )}
              {currentStep === 'results' && (
                <ResultsPage answers={answers} companyName={companyName} email={email} contactName={contactName} onRestart={handleRestart} onShowAnalytics={handleShowAnalytics} />
              )}
            </>
          )}
        </div>
      );
    }

    function bootstrap() {
      if (!window.React || !window.ReactDOM) {
        // libs not ready yet - retry shortly
        return setTimeout(bootstrap, 100);
      }
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      } catch (err) {
        console.error('[adesso] Mount error:', err);
        const splashErr = document.getElementById('splash-err');
        if (splashErr) {
          splashErr.style.display = 'block';
          splashErr.textContent = 'Error rendering app: ' + (err && err.message ? err.message : err);
        }
      }
    }
    bootstrap();
  </script>
</body>
</html>
